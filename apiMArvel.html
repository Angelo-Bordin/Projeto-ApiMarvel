<html>
    <head>
        <title>Api Marvel</title>
        <link rel="stylesheet" type="text/css" href="apiCss.css" media="screen" />
    </head>
    <body id="corpo" style="background-color: #f00">
        <header id="cabecalho">
            <h1> Projeto de Utilização - API ©</h1>
        </header>
        <div id="herois">
        </div>
    </body>
    <script>
        const timeStamp = '1640717903935';  
        const apiKey    = '8aad93b3f4c0877d45718b61951bdeca';
        const hash      = '2c877bb0dcd41cad12288d9f4108cb56';

        fetch(`https://gateway.marvel.com:443/v1/public/characters?ts=${timeStamp}&apikey=${apiKey}&hash=${hash}`
        ).then((resposta) => {
            return resposta.json();
        }).then((jsonParsed) => {
            console.log(jsonParsed)
            const divHerois = document.querySelector('#herois');

            jsonParsed.data.results.forEach(element => {
                const srcImagem   = element.thumbnail.path +'.'+ element.thumbnail.extension
                const nomeHeroi   = element.name

                createDivHero(srcImagem, nomeHeroi, divHerois, element)
            
            });
        })

        function createDivHero(srcImagem, nomeHeroi, divHerois, element){           
            const divPai   = document.createElement('div')
            const divFilho = document.createElement('div')
            const divTexto = document.createElement('div')
            const textName = document.createElement('text')
            const imagem   = document.createElement('img')

            const container = document.createElement('div')
            const descricao = document.createElement('div')

            container.textContent = "Comics"
            container.appendChild(descricao)

            container.classList.add("container")
            descricao.classList.add("descricao")

            textName.textContent = nomeHeroi
            imagem.src = srcImagem


            divTexto.appendChild(textName)
            divFilho.appendChild(imagem)
            divFilho.appendChild(container)
            divPai.appendChild(divFilho)
            divPai.appendChild(divTexto)
            divHerois.appendChild(divPai)

            divFilho.classList.add("divFilho")
            divTexto.classList.add("nomePersonagem")
            divPai.classList.add("personagem")

            element.comics.items.forEach(comic => {
                var nameComic = comic.name
                descricao.innerHTML += nameComic + "<br>"            
            });
        }
        
    </script>
    <footer id="rodape">
            <text id="assinatura">
                Projeto para utilização da Api Marvel.<br>
                By: Angelo Bordin<br>
                <a href="https://www.instagram.com/angelo_bordin/">Instagram</a> | 
                <a href="https://www.linkedin.com/in/angelo-bordin/">Linkedin</a>
            </text>
    </footer>
</html>
